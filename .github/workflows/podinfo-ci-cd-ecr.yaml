# .github/workflows/podinfo-ci-cd-ecr.yml
#
# GITHUB FLOW STRATEGY:
#   • feature/* branches  → PR workflow: lint + test only (quality gate before merge)
#   • main branch         → full pipeline: lint + test + build + push + trigger Jenkins
#
# RUNNER STRATEGY:
#   • Public GHA runners (ubuntu-latest) for: lint, test, build, push to ECR
#     Reason: these jobs need no private network access, public runners are free & fast
#   • Self-hosted runner (inside EKS) for: triggering Jenkins
#     Reason: Jenkins is private — only our in-cluster runner can reach it
#     The self-hosted runner registers outbound to GitHub, so Jenkins never
#     needs a public IP or open inbound firewall rule.
#
# ECR AUTH STRATEGY — OIDC (no static AWS keys):
#   Instead of storing AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY as secrets
#   (which are long-lived, rotatable, and leakable), we use OIDC.
#   GitHub acts as an identity provider. AWS trusts GitHub's OIDC tokens.
#   The workflow exchanges a short-lived GitHub JWT for temporary AWS credentials
#   that expire when the run ends. Nothing to rotate, nothing to leak.


name: podinfo CI/CD - ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.11.7"
  AWS_REGION: "us-east-1"           
  ECR_REPOSITORY: "podinfo"

jobs:

  # ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Ruff — lint
        run: uv run ruff check . --output-format=github

      - name: Black — format check
        run: uv run black --check .

      - name: Mypy — type check
        run: uv run mypy src/

      - name: Bandit — security scan
        run: uv run bandit -c pyproject.toml -r src/

  # ── Job 2: Tests ───────────────────────────────────────────────────────────
  tests:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run tests
        run: uv run pytest

  # ── Job 3: Build & Push to ECR ────────────────────────────────────────────
  build-and-push:
    name: "Build & Push to ECR"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [lint, tests]

    # REQUIRED for OIDC authentication to AWS.
    # id-token: write  → allows the workflow to request a JWT from GitHub's OIDC provider
    # contents: read   → allows checkout
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials via OIDC
        # This action exchanges the GitHub OIDC JWT for temporary AWS credentials.
        # No static keys anywhere — credentials are valid for this run only.
        # role-to-assume: the IAM role ARN we created with ECR push permissions.
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-podinfo-${{ github.run_id }}

      - name: Log in to Amazon ECR
        id: login-ecr
        # This action runs: aws ecr get-login-password
        # using the temporary credentials obtained in the previous step.
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ECR image URI format:
          # <account_id>.dkr.ecr.<region>.amazonaws.com/<repository>:<tag>
          # steps.login-ecr.outputs.registry resolves to the account/region-specific URL
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            APP_VERSION=${{ github.ref_name }}-${{ steps.tag.outputs.short_sha }}
            GIT_SHA=${{ github.sha }}
          labels: |
            git.sha=${{ github.sha }}
            git.branch=${{ github.ref_name }}
            build.run_id=${{ github.run_id }}

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ECR Push

          | Field      | Value |
          |---|---|
          | Image      | ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.short_sha }} |
          | SHA        | ${{ github.sha }} |
          | Run ID     | ${{ github.run_id }} |
          EOF

  # ── Job 4: Trigger Jenkins Deployment Pipeline ────────────────────────────
  # Runs on our self-hosted runner inside EKS so it can reach the private
  # Jenkins instance via in-cluster DNS — no public exposure of Jenkins needed.
  #
  # Uses our own composite action (.github/actions/trigger-jenkins/action.yml)
  #
  # Flow:
  #   1. POST to Jenkins → build is queued  → Jenkins returns a queue item URL
  #   2. Poll queue item URL               → wait until Jenkins assigns a build number
  #   3. Poll build status every N seconds → wait until result is not null
  #   4. Exit 0 (success) or 1 (failure)  → this job reflects Jenkins outcome
  #
  # This means the GHA workflow run is green ONLY if Jenkins also succeeded.
  trigger-jenkins:
    name: "Trigger Jenkins Deployment"
    runs-on: self-hosted
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
 
    steps:
      - uses: actions/checkout@v6
 
      - name: Trigger Jenkins and wait for result
        uses: ./.github/actions/trigger-jenkins
        with:
          jenkins-url:   ${{ secrets.JENKINS_URL }}
          jenkins-user:  ${{ secrets.JENKINS_USER }}
          jenkins-token: ${{ secrets.JENKINS_API_TOKEN }}
          job-name:      "podinfo-deploy"
          # Pass everything Jenkins needs to run the deployment pipeline
          job-parameters: |
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            IMAGE_URI=${{ needs.build-and-push.outputs.image_uri }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            TRIGGERED_BY=${{ github.actor }}
          # How long to wait for Jenkins before giving up.
          # 10 minutes covers: ArgoCD sync + pod rollout + smoke tests.
          timeout-seconds:      "600"
          poll-interval-seconds: "15"