# .github/workflows/podinfo-ci-cd-dockerhub.yml
#
# GITHUB FLOW STRATEGY:
#   • feature/* branches  → no push pipeline
#   • PR to main          → lint + unit test only (quality gate before merge)
#   • merge/push to main  → full pipeline: lint + unit test + build + push + trigger Jenkins
#
# RUNNER STRATEGY:
#   • Public GHA runners (ubuntu-latest) for: lint, test, build, push to Docker Hub
#     Reason: these jobs need no private network access, public runners are free & fast
#   • Self-hosted runner (inside EKS) for: triggering Jenkins
#     Reason: Jenkins is private - only our in-cluster runner can reach it
#     The self-hosted runner registers outbound to GitHub, so Jenkins never
#     needs a public IP or open inbound firewall rule.


name: podinfo CI/CD - Docker Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      manual_run_mode:
        description: "Manual run mode"
        required: false
        default: "validate_only"
        type: choice
        options:
          - validate_only
          - build_and_push
          - build_push_and_deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.11.7"
  DOCKERHUB_IMAGE: "devuser103/podinfo"

jobs:

  # ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Ruff — lint
        run: uv run ruff check . --output-format=github

      - name: Black — format check
        run: uv run black --check .

      - name: Mypy — type check
        run: uv run mypy src/

      - name: Bandit — security scan
        run: uv run bandit -c pyproject.toml -r src/

  # ── Job 2: Tests ───────────────────────────────────────────────────────────
  tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run tests
        run: uv run pytest

  # ── Job 3: Build & Push to Docker Hub ─────────────────────────────────────
  build-and-push:
    name: "Build & Push to Docker Hub"
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["build_and_push","build_push_and_deploy"]'), inputs.manual_run_mode))
    needs: [lint, tests]
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}
      image_uri: ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.short_sha }}
      image_digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          build-args: |
            APP_VERSION=${{ github.ref_name }}-${{ steps.tag.outputs.short_sha }}
            GIT_SHA=${{ github.sha }}
          labels: |
            git.sha=${{ github.sha }}
            git.branch=${{ github.ref_name }}
            build.run_id=${{ github.run_id }}

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Docker Hub Push

          | Field | Value |
          |---|---|
          | Registry | Docker Hub |
          | Repository | \`${{ env.DOCKERHUB_IMAGE }}\` |
          | Image (versioned) | \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.short_sha }}\` |
          | Image (latest) | \`${{ env.DOCKERHUB_IMAGE }}:latest\` |
          | Image digest | \`${{ steps.build.outputs.digest }}\` |
          | Git SHA | \`${{ github.sha }}\` |
          | Workflow run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          EOF

  # ── Job 4: Trigger Jenkins Deployment Pipeline ────────────────────────────
  # Runs on our self-hosted runner inside EKS so it can reach the private
  # Jenkins instance via in-cluster DNS — no public exposure of Jenkins needed.
  #
  # Uses our own composite action (.github/actions/trigger-jenkins/action.yml)
  #
  # Flow:
  #   1. POST to Jenkins → build is queued  → Jenkins returns a queue item URL
  #   2. Poll queue item URL               → wait until Jenkins assigns a build number
  #   3. Poll build status every N seconds → wait until result is not null
  #   4. Exit 0 (success) or 1 (failure)  → this job reflects Jenkins outcome
  #
  # This means the GHA workflow run is green ONLY if Jenkins also succeeded.
  trigger-jenkins:
    name: "Trigger Jenkins Deployment"
    runs-on: self-hosted
    needs: [build-and-push]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.manual_run_mode == 'build_push_and_deploy')
 
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
 
      - name: Trigger Jenkins and wait for result
        uses: ./.github/actions/trigger-jenkins
        with:
          jenkins-url:   ${{ secrets.JENKINS_URL }}
          jenkins-user:  ${{ secrets.JENKINS_USER }}
          jenkins-token: ${{ secrets.JENKINS_API_TOKEN }}
          job-name:      "podinfo-deploy"
          # Pass everything Jenkins needs to run the deployment pipeline
          job-parameters: |
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            IMAGE_URI=${{ needs.build-and-push.outputs.image_uri }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            TRIGGERED_BY=${{ github.actor }}
          # How long to wait for Jenkins before giving up.
          # 10 minutes covers: ArgoCD sync + pod rollout + smoke tests.
          timeout-seconds:      "600"
          poll-interval-seconds: "15"